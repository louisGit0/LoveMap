<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>LoveMap</title>
<style>
  :root { --bg:#000; --line:#1f1f1f; --text:#fff; --faint:#8a8a8a; --rose:#ff2d87; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:var(--bg); color:var(--text); font-family:-apple-system,system-ui,sans-serif; min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px; }
  .wrap { max-width:520px; text-align:center; }
  .eyebrow { font-family:ui-monospace,monospace; font-size:11px; letter-spacing:3px; text-transform:uppercase; color:var(--rose); margin-bottom:18px; }
  h1 { font-size:56px; font-style:italic; font-family:Georgia,serif; letter-spacing:-2px; margin-bottom:18px; }
  p { color:var(--faint); font-size:15px; line-height:1.6; margin-bottom:32px; }
  .links { display:flex; gap:14px; justify-content:center; flex-wrap:wrap; }
  a { color:var(--rose); text-decoration:none; border:1px solid var(--line); padding:12px 20px; border-radius:999px; font-size:14px; }
  a:hover { border-color:var(--rose); }
</style>
</head>
<body>
<div class="wrap">
  <div class="eyebrow">Journal intime cartographié</div>
  <h1>lovemap</h1>
  <p>Un carnet privé pour cartographier ses moments intimes, partagé uniquement avec un cercle d'amis approuvés. Réservé aux adultes (18+).</p>
  <div class="links">
    <a href="privacy.html">Politique de confidentialité</a>
    <a href="terms.html">Conditions d'utilisation</a>
    <a href="mailto:louissoudy2@gmail.com">Support</a>
  </div>
</div>
</body>
</html>
