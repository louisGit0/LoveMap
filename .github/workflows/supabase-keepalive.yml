name: Supabase keep-alive

# Empêche la base Supabase (plan gratuit du projet mjthnlvcgavcifmgijxt) de se
# mettre en pause après ~7 jours d'inactivité. Un ping toutes les 48 h exécute
# une vraie requête SQL (via PostgREST) et réinitialise le compteur d'inactivité.
# Contexte : une base en pause = login mort = refus App Store 2.1a (cf. CLAUDE.md).
# Les valeurs viennent des secrets repo SUPABASE_URL / SUPABASE_ANON_KEY.

on:
  schedule:
    - cron: '17 6 */2 * *'   # toutes les ~48 h, 06:17 UTC
  workflow_dispatch: {}        # déclenchement manuel depuis l'onglet Actions

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST (génère de l'activité DB)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_ANON_KEY" ]; then
            echo "Secrets SUPABASE_URL / SUPABASE_ANON_KEY manquants"; exit 1
          fi
          code=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "apikey: $SUPABASE_ANON_KEY" \
            -H "Authorization: Bearer $SUPABASE_ANON_KEY" \
            "$SUPABASE_URL/rest/v1/profiles?select=id&limit=1")
          echo "HTTP $code"
          if [ "$code" != "200" ]; then
            echo "Keep-alive échoué (HTTP $code)"; exit 1
          fi
          echo "Base Supabase active ✓"
